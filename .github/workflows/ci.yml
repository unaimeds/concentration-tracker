name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'pnpm'

      - run: pnpm i --frozen-lockfile

      - run: pnpm format
      - run: pnpm lint
      - run: pnpm exec tsc --noEmit
      - run: pnpm build
